name: Daily Blog Generator
on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 every day
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install openai

      - name: Generate Post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_blog.py

      - name: Commit and Push
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.dev"
          git add .
          git commit -m "Automated Daily Blog Update"
          git push
